# ==============================================================================
# SWIFTLLM — docker-compose (production / GPU)
# ------------------------------------------------------------------------------
# Run from this docker/ directory:
#     cp .env.example .env      # edit SWIFTLLM_MODEL etc.
#     docker compose up -d --build
#
# OS is selected via .env (SWIFTLLM_DOCKERFILE / SWIFTLLM_IMAGE) — the
# swiftllmctl wrapper flips these for you with --ubuntu / --rhel.
#
# Requires the NVIDIA Container Toolkit on the host for GPU access.
# ==============================================================================
name: swiftllm

services:
  swiftllm:
    image: ${SWIFTLLM_IMAGE:-swiftllm:ubuntu-2.0.0}
    build:
      context: ..
      dockerfile: ${SWIFTLLM_DOCKERFILE:-docker/Dockerfile.ubuntu}
      target: ${SWIFTLLM_TARGET:-runtime}
      args:
        CUDA_VERSION: ${CUDA_VERSION:-12.4.1}
        UBUNTU_VERSION: ${UBUNTU_VERSION:-22.04}
        UBI_VERSION: ${UBI_VERSION:-ubi9}
        PYTHON_VERSION: ${PYTHON_VERSION:-3.10}
        SWIFTLLM_FEATURES: ${SWIFTLLM_FEATURES:-cuda}
        CUDA_ARCHITECTURES: ${CUDA_ARCHITECTURES:-80;86;89;90}
        BUILD_LLAMA: ${BUILD_LLAMA:-1}
        RUST_VERSION: ${RUST_VERSION:-stable}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cu124}
        TORCH_SPEC: ${TORCH_SPEC:-torch torchvision}
        SWIFTLLM_UID: ${SWIFTLLM_UID:-1000}
        SWIFTLLM_GID: ${SWIFTLLM_GID:-1000}
        SWIFTLLM_GIT_URL: ${SWIFTLLM_GIT_URL:-}
        SWIFTLLM_GIT_REF: ${SWIFTLLM_GIT_REF:-}
    container_name: swiftllm
    restart: unless-stopped
    init: true
    command: ["serve"]
    ports:
      - "${SWIFTLLM_HOST_PORT:-8000}:${SWIFTLLM_PORT:-8000}"
    environment:
      SWIFTLLM_MODEL: ${SWIFTLLM_MODEL:-}
      SWIFTLLM_HOST: ${SWIFTLLM_HOST:-0.0.0.0}
      SWIFTLLM_PORT: ${SWIFTLLM_PORT:-8000}
      SWIFTLLM_MODEL_DIR: ${SWIFTLLM_MODEL_DIR:-/models}
      SWIFTLLM_TENSOR_PARALLEL_SIZE: ${SWIFTLLM_TENSOR_PARALLEL_SIZE:-}
      SWIFTLLM_GPU_MEMORY_UTILIZATION: ${SWIFTLLM_GPU_MEMORY_UTILIZATION:-}
      SWIFTLLM_MAX_MODEL_LEN: ${SWIFTLLM_MAX_MODEL_LEN:-}
      SWIFTLLM_QUANTIZATION: ${SWIFTLLM_QUANTIZATION:-}
      SWIFTLLM_DTYPE: ${SWIFTLLM_DTYPE:-}
      SWIFTLLM_TRUST_REMOTE_CODE: ${SWIFTLLM_TRUST_REMOTE_CODE:-}
      SWIFTLLM_ENABLE_PREFIX_CACHING: ${SWIFTLLM_ENABLE_PREFIX_CACHING:-}
      SWIFTLLM_SERVE_ARGS: ${SWIFTLLM_SERVE_ARGS:-}
      SWIFTLLM_API_KEY: ${SWIFTLLM_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      # Persistent model cache. Swap for a host path if you prefer:
      #   - /data/swiftllm/models:/models
      - swiftllm-models:/models
    # ---- GPU access (NVIDIA Container Toolkit) -------------------------------
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==========================================================================
  # One-shot training / dataset jobs (GPU). Behind the "train" profile, so a
  # plain `docker compose up` does NOT start it. Reuses the image built by the
  # `swiftllm` service — build that first (`docker compose build` / swiftllmctl).
  #
  #   docker compose run --rm trainer \
  #       swiftllm train -m <model> --train-data /data/train.jsonl -o /models/runs/exp1
  #   docker compose run --rm trainer swiftllm dataset --help
  #
  # Datasets: drop files in ./data (or set SWIFTLLM_DATA_HOST). Write checkpoints
  # under /models (the persistent volume the container user can write to).
  #
  # NOTE: swiftllm's training backend is currently a SIMULATED stub — this runs
  # the CLI / config / checkpoint plumbing, not real gradient updates.
  # ==========================================================================
  trainer:
    profiles: ["train"]
    image: ${SWIFTLLM_IMAGE:-swiftllm:ubuntu-2.0.0}
    environment:
      SWIFTLLM_MODEL_DIR: ${SWIFTLLM_MODEL_DIR:-/models}
      HF_TOKEN: ${HF_TOKEN:-}
      SWIFTLLM_API_KEY: ${SWIFTLLM_API_KEY:-}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
    volumes:
      - swiftllm-models:/models                  # checkpoints / output (writable)
      - ${SWIFTLLM_DATA_HOST:-./data}:/data      # your datasets (host directory)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  swiftllm-models:
    name: swiftllm-models
